<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Ice Cream Date</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg-hearts"></div>

<div class="container">

<h1 id="question">Ready for a small fun quiz? 😄</h1>

<img src="couple.gif" class="hero">

<div class="buttons">

<button id="yesBtn">Yes 💙</button>
<button id="noBtn">No 🙈</button>

</div>

<div id="cinema" class="hidden">

  <div id="emotionalText"></div>

  <img src="bouquet.png" id="bouquet">

  <audio id="voice">
    <source src="voice.mp3">
  </audio>

</div>  

<p id="message"></p>

</div>

<button id="musicToggle">🎵</button>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
