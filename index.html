<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Date 🍦</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="bg-hearts"></div>
<div id="cursorTrail"></div>

<div class="container" id="mainContainer">
  <div class="glass-inner">
    <h1 id="question" class="fadeInUp">Ready for a small fun quiz? 😄</h1>
    <img src="couple.gif" class="hero fadeInUp delay1">
    <div class="buttons fadeInUp delay2">
      <button id="optA" class="btn-yes">Option A</button>
      <button id="optB" class="btn-no">Option B</button>
    </div>
    <p id="message"></p>
  </div>
</div>

<!-- Cinema mode — NO hidden class, controlled by opacity only -->
<div id="cinema">
  <div class="cinema-bg"></div>
  <div id="emotionalText"></div>
  <div id="cursor">|</div>
  <img src="bouquet.png" id="bouquet">
</div>

<button id="musicToggle" title="Toggle Music">🎵</button>
<audio id="music" loop><source src="music.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
